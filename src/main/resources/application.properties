spring.application.name=learningplatform
server.port=8080

# Configuración de la base de datos H2 en memoria
# Los datos se almacenan temporalmente mientras la aplicación está en ejecución
spring.datasource.url=jdbc:h2:mem:learningPlatformDb
spring.datasource.username=sa
spring.datasource.password=
spring.datasoruce.driver-class-name=org.h2.Driver

# Hibernate crea las tablas al iniciar y las elimina al cerrar
spring.jpa.hibernate.ddl-auto=create-drop
# Habilita la consola web de H2 en http://localhost:8080/h2-console
spring.h2.console.enabled=true

# Configuración del pool de conexiones HikariCP
# Tiempo máximo de espera para obtener una conexión (30 segundos)
spring.datasource.hikari.connection-timeout=30000
# Número máximo de conexiones simultáneas a la base de datos
spring.datasource.hikari.maximum-pool-size=10